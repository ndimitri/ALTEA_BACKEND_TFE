# ==========================================
# ALTEA Backend - Application Configuration
# ==========================================

spring.application.name=altea-backend

# --- PostgreSQL ---
spring.datasource.url=jdbc:postgresql://localhost:5432/altea_db
spring.datasource.username=postgres
spring.datasource.password=nikesakou11
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate (CODE FIRST) ---
# create-drop : recrée tout à chaque démarrage (dev)
# update      : met à jour sans perdre les données (recommandé prod)
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# --- Serveur ---
server.port=8080
server.servlet.context-path=/api

# --- JWT ---
altea.jwt.secret=alteaSecretKey2025EphEcNicolasDimitriadisSecureSigningKeyForJWTTokens
altea.jwt.expiration=86400000

# --- OpenAPI / Swagger ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# --- Logging ---
logging.level.fr.ephec.altea=DEBUG
logging.level.org.springframework.security=INFO
